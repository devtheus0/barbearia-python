<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Agendamento - Império Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar {
            background: #2c3e50;
            min-height: 100vh;
            color: white;
        }
        .sidebar .nav-link {
            color: #ecf0f1;
            padding: 0.75rem 1rem;
            margin: 0.25rem 0;
            border-radius: 5px;
        }
        .sidebar .nav-link:hover {
            background: #34495e;
            color: white;
        }
        .sidebar .nav-link.active {
            background: #3498db;
        }
        .main-content {
            background: #f8f9fa;
            min-height: 100vh;
        }
        .form-card {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 px-0 sidebar">
                <div class="p-3">
                    <h5 class="text-center mb-4">
                        <i class="fas fa-cut"></i> Império Barber
                    </h5>
                    <nav class="nav flex-column">
                        <a class="nav-link" href="{{ url_for('dashboard') }}">
                            <i class="fas fa-tachometer-alt"></i> Dashboard
                        </a>
                        <a class="nav-link" href="{{ url_for('listar_clientes') }}">
                            <i class="fas fa-users"></i> Clientes
                        </a>
                        <a class="nav-link" href="{{ url_for('listar_servicos') }}">
                            <i class="fas fa-scissors"></i> Serviços
                        </a>
                        <a class="nav-link active" href="{{ url_for('listar_agendamentos') }}">
                            <i class="fas fa-calendar-check"></i> Agendamentos
                        </a>
                        <a class="nav-link" href="{{ url_for('relatorios') }}">
                            <i class="fas fa-chart-bar"></i> Relatórios
                        </a>
                        <hr>
                        <a class="nav-link" href="{{ url_for('logout') }}">
                            <i class="fas fa-sign-out-alt"></i> Sair
                        </a>
                    </nav>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 px-0 main-content">
                <div class="p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="fas fa-calendar-plus"></i> Novo Agendamento</h2>
                        <a href="{{ url_for('listar_agendamentos') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Voltar
                        </a>
                    </div>

                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            <div class="alert alert-danger" role="alert">
                                {{ messages[0] }}
                            </div>
                        {% endif %}
                    {% endwith %}

                    <div class="row justify-content-center">
                        <div class="col-md-8">
                            <div class="form-card">
                                <form method="POST">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="cliente" class="form-label">
                                                <i class="fas fa-user"></i> Cliente
                                            </label>
                                            <select class="form-select form-select-lg" id="cliente" name="cliente" required>
                                                <option value="">Selecione um cliente</option>
                                                {% for cliente in clientes %}
                                                    <option value="{{ cliente }}">{{ cliente }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="servico" class="form-label">
                                                <i class="fas fa-cut"></i> Serviço
                                            </label>
                                            <select class="form-select form-select-lg" id="servico" name="servico" required>
                                                <option value="">Selecione um serviço</option>
                                                {% for servico in servicos %}
                                                    <option value="{{ servico.nome }}">{{ servico.nome }} - R$ {{ "%.2f"|format(servico.preco) }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="dia" class="form-label">
                                                <i class="fas fa-calendar"></i> Data (DD/MM)
                                            </label>
                                            <input type="text" class="form-control form-control-lg" id="dia" name="dia" required placeholder="Ex: 25/12" pattern="\d{2}/\d{2}">
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="horario" class="form-label">
                                                <i class="fas fa-clock"></i> Horário
                                            </label>
                                            <select class="form-select form-select-lg" id="horario" name="horario" required>
                                                <option value="">Selecione um horário</option>
                                                {% for horario in horarios %}
                                                    <option value="{{ horario }}">{{ horario }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </div>
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary btn-lg">
                                            <i class="fas fa-save"></i> Agendar
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
